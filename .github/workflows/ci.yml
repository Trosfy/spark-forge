name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091

      - name: validate JSON manifests
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/forge/.claude-plugin/plugin.json

      - name: python compile
        run: python3 -m py_compile plugins/forge/scripts/*.py

      - name: build model graphs
        run: python3 plugins/forge/tests/test_graphs.py

      - name: terraform fmt
        uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra fmt -check -recursive

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
